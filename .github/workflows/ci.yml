name: CI
on:
  push:
    branches: [main]
  pull_request: {}

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: continuum
          POSTGRES_PASSWORD: continuum
          POSTGRES_DB: continuum
        ports:
          - "5432:5432"
        options: >-
          --health-cmd pg_isready --health-interval 10s
          --health-timeout 5s --health-retries 5
    env:
      DATABASE_URL: postgresql://continuum:continuum@localhost:5432/continuum
      API_SERVICE_TOKEN: dev-shared-service-token
      SERVICE_TOKEN: dev-shared-service-token
      API_BASE_URL: http://localhost:8000
      # Dummy CI-only secret — replace with ${{ secrets.BETTER_AUTH_SECRET }} before any real-environment use
      BETTER_AUTH_SECRET: ci-secret-not-for-production-00000000
      BETTER_AUTH_URL: http://localhost:3000
      NEXT_PUBLIC_BETTER_AUTH_URL: http://localhost:3000
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.2
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - uses: astral-sh/setup-uv@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pnpm install --frozen-lockfile
      - run: cd apps/api && uv sync
      - run: cd apps/api && uv run alembic upgrade head
      - run: pnpm turbo run lint typecheck test build
